version: '3.9'

services:

  # ─── Bases de datos ────────────────────────────────────────────────────────

  users-db:
    image: postgres:16-alpine
    container_name: sushi_users_db
    environment:
      POSTGRES_DB:       users_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
      # init.sql se ejecuta automáticamente la primera vez que se crea el volumen
      - ./database/users-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    container_name: sushi_orders_db
    environment:
      POSTGRES_DB:       orders_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"     # puerto distinto para no chocar con users-db en tu máquina
    volumes:
      - orders_db_data:/var/lib/postgresql/data
      - ./database/orders-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Servicios ─────────────────────────────────────────────────────────────
  # Los servicios se agregan aquí cuando tengamos los Dockerfiles listos.
  # Por ahora solo levantamos las bases de datos para desarrollo.

  # users-service:
  #   build:
  #     context: ./services/users-service
  #     dockerfile: Dockerfile
  #   container_name: sushi_users_service
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@users-db:5432/users_db
  #     JWT_SECRET: change_this_in_production
  #     TZ: UTC
  #   depends_on:
  #     users-db:
  #       condition: service_healthy

  # orders-service:
  #   build:
  #     context: ./services/orders-service
  #     dockerfile: Dockerfile
  #   container_name: sushi_orders_service
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     DB_HOST:     orders-db
  #     DB_PORT:     5432
  #     DB_NAME:     orders_db
  #     DB_USER:     postgres
  #     DB_PASSWORD: postgres
  #     TZ: UTC
  #   depends_on:
  #     orders-db:
  #       condition: service_healthy

# ─── Volúmenes ───────────────────────────────────────────────────────────────
# Los volúmenes persisten los datos aunque apagues los containers.
# Para resetear las bases de datos: docker-compose down -v

volumes:
  users_db_data:
  orders_db_data:
